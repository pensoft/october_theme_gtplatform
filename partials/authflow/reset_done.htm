<div class="pgt-modal-card pgt-activated">
    <button type="button" class="pgt-close" data-pgt-close aria-label="Close">&times;</button>

    <div class="pgt-activated__icon" aria-hidden="true"></div>

    <div class="pgt-activated__body">
        <h2 class="pgt-activated__title">Password updated</h2>
        <p class="pgt-activated__sub">You can now sign in with your new password.</p>
    </div>

    <div class="pgt-activated__actions">
        <button type="button" class="pgt-activated__continue" data-pgt-step="login">Continue to log in</button>
    </div>
</div>
