<div class="pgt-modal-card pgt-reset">
    <button type="button" class="pgt-close" data-pgt-close aria-label="Close">&times;</button>

    <div class="pgt-reset__head">
        <h2 class="pgt-reset__title">Set a new password</h2>
        <p class="pgt-reset__lead">
            Choose a new password for your account. Make sure it&rsquo;s something you&rsquo;ll remember.
        </p>
    </div>

    <form id="pgtResetForm" data-request="{{ __SELF__ }}::onResetPassword" class="pgt-reset__form">
        <input type="hidden" name="code" value="{{ resetCode }}">

        <div class="pgt-reset__fields">
            <div class="pgt-field pgt-field--password">
                <div class="pgt-field__header">
                    <label for="pgtResetPassword">New password</label>
                    <button type="button" class="pgt-password-toggle" data-pgt-toggle-password="#pgtResetPassword" aria-label="Show password">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M19.8825 4.88134L19.1465 4.14539C18.9385 3.9374 18.5545 3.96941 18.3145 4.25736L15.7543 6.80132C14.6023 6.30538 13.3384 6.06538 12.0103 6.06538C8.05822 6.08132 4.63444 8.38529 2.98633 11.6975C2.8903 11.9055 2.8903 12.1614 2.98633 12.3374C3.75426 13.9054 4.90633 15.2015 6.34633 16.1774L4.25034 18.3054C4.01034 18.5454 3.97833 18.9293 4.13838 19.1374L4.87432 19.8733C5.08231 20.0813 5.4663 20.0493 5.7063 19.7613L19.7542 5.71345C20.0582 5.47358 20.0902 5.08962 19.8822 4.88161L19.8825 4.88134ZM12.8583 9.71322C12.5863 9.6492 12.2984 9.56925 12.0264 9.56925C10.6663 9.56925 9.57842 10.6573 9.57842 12.0172C9.57842 12.2892 9.64244 12.5771 9.72239 12.8492L8.65028 13.9052C8.33032 13.3452 8.15433 12.7211 8.15433 12.0172C8.15433 9.88924 9.86636 8.17722 11.9943 8.17722C12.6984 8.17722 13.3224 8.3532 13.8823 8.67316L12.8583 9.71322Z" fill="#666666" fill-opacity="0.8"/>
                            <path d="M21.0344 11.6974C20.4745 10.5774 19.7384 9.56945 18.8265 8.75342L15.8504 11.6974V12.0174C15.8504 14.1454 14.1384 15.8574 12.0104 15.8574H11.6905L9.80249 17.7454C10.5065 17.8893 11.2425 17.9854 11.9625 17.9854C15.9146 17.9854 19.3384 15.6814 20.9865 12.3532C21.1305 12.1292 21.1305 11.9053 21.0345 11.6973L21.0344 11.6974Z" fill="#666666" fill-opacity="0.8"/>
                        </svg>
                        <span class="pgt-password-toggle__text">Show</span>
                    </button>
                </div>
                <input type="password" id="pgtResetPassword" name="password" autocomplete="new-password">
                <p class="pgt-help">Use 8 or more characters with a mix of letters, numbers &amp; symbols</p>
            </div>

            <div class="pgt-field pgt-field--password">
                <div class="pgt-field__header">
                    <label for="pgtResetConfirm">Confirm new password</label>
                    <button type="button" class="pgt-password-toggle" data-pgt-toggle-password="#pgtResetConfirm" aria-label="Show password">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M19.8825 4.88134L19.1465 4.14539C18.9385 3.9374 18.5545 3.96941 18.3145 4.25736L15.7543 6.80132C14.6023 6.30538 13.3384 6.06538 12.0103 6.06538C8.05822 6.08132 4.63444 8.38529 2.98633 11.6975C2.8903 11.9055 2.8903 12.1614 2.98633 12.3374C3.75426 13.9054 4.90633 15.2015 6.34633 16.1774L4.25034 18.3054C4.01034 18.5454 3.97833 18.9293 4.13838 19.1374L4.87432 19.8733C5.08231 20.0813 5.4663 20.0493 5.7063 19.7613L19.7542 5.71345C20.0582 5.47358 20.0902 5.08962 19.8822 4.88161L19.8825 4.88134ZM12.8583 9.71322C12.5863 9.6492 12.2984 9.56925 12.0264 9.56925C10.6663 9.56925 9.57842 10.6573 9.57842 12.0172C9.57842 12.2892 9.64244 12.5771 9.72239 12.8492L8.65028 13.9052C8.33032 13.3452 8.15433 12.7211 8.15433 12.0172C8.15433 9.88924 9.86636 8.17722 11.9943 8.17722C12.6984 8.17722 13.3224 8.3532 13.8823 8.67316L12.8583 9.71322Z" fill="#666666" fill-opacity="0.8"/>
                            <path d="M21.0344 11.6974C20.4745 10.5774 19.7384 9.56945 18.8265 8.75342L15.8504 11.6974V12.0174C15.8504 14.1454 14.1384 15.8574 12.0104 15.8574H11.6905L9.80249 17.7454C10.5065 17.8893 11.2425 17.9854 11.9625 17.9854C15.9146 17.9854 19.3384 15.6814 20.9865 12.3532C21.1305 12.1292 21.1305 11.9053 21.0345 11.6973L21.0344 11.6974Z" fill="#666666" fill-opacity="0.8"/>
                        </svg>
                        <span class="pgt-password-toggle__text">Show</span>
                    </button>
                </div>
                <input type="password" id="pgtResetConfirm" name="password_confirmation" autocomplete="new-password">
            </div>
        </div>

        <div class="pgt-reset__actions">
            <button type="submit" class="pgt-reset__submit">Reset password</button>
        </div>

        <p class="pgt-reset__back">
            Remembered your password? <a href="#" data-pgt-step="login">Back to log in</a>
        </p>
    </form>
</div>
